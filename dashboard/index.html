<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presidencia 2026 - Resultados por Mesa</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:0;
}

header{
    background:#1b4f72;
    color:white;
    padding:20px;
}

h1{
    margin:0;
}

h2{
    margin-top:5px;
    font-weight:normal;
}

.container{
    padding:20px;
}

select{
    padding:8px;
    margin:5px 5px 15px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td{
    padding:10px;
    border:1px solid #ddd;
}

th{
    background:#f0f0f0;
}

.total-votos{
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
}

.breadcrumb{
    margin-bottom:15px;
    color:#666;
}

</style>

</head>

<body>

<header>

<h1>Presidencia 2026</h1>
<h2>Resultados por Mesa</h2>

</header>

<div class="container">

<div class="breadcrumb" id="breadcrumb"></div>

<select id="dep-select">
<option value="">Seleccione departamento</option>
</select>

<select id="mun-select">
<option value="">Seleccione municipio</option>
</select>

<select id="zona-select">
<option value="">Seleccione zona</option>
</select>

<select id="puesto-select">
<option value="">Seleccione puesto</option>
</select>

<select id="mesa-select">
<option value="">Seleccione mesa</option>
</select>

<table id="results-table">

<thead>
<tr>
<th>Candidato</th>
<th>Votos</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<div id="total-votos" class="total-votos" style="display:none;"></div>

</div>

<script src="app.js"></script>

</body>
</html>
