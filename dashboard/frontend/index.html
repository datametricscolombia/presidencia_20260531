<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Nacional</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 16px;
    background: #f4f6f9;
}

.container {
    max-width: 900px;
    margin: auto;
}

h2 {
    text-align: center;
}

/* SELECTOR */
.selector {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
    gap: 10px;
}

.selector button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #ccc;
}

.selector button.active {
    background: #007bff;
    color: white;
}

/* BUSCADOR */
.search-box {
    position: relative;
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button.buscar {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
    cursor: pointer;
}

button.buscar:hover {
    background: #0056b3;
}

.clear-btn {
    position: absolute;
    right: 110px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: none;
    color: #999;
}

.table-container {
    margin-top: 20px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

td {
    border: 1px solid #ddd;
    padding: 10px;
}

.loading {
    text-align: center;
    margin-top: 10px;
}

.error {
    color: red;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h2>Consulta por Número de ID</h2>

<div class="selector">
    <button id="btnTestigos" class="active" onclick="setTipo('testigos')">Testigos</button>
    <button id="btnVotantes" onclick="setTipo('votantes')">Votantes</button>
</div>

<div class="search-box">
    <input type="text" id="inputId" placeholder="Ingrese número de identificación">
    <span class="clear-btn" id="clearBtn">✕</span>
    <button class="buscar" onclick="buscar()">Buscar</button>
</div>

<div id="status" class="loading"></div>
<div id="resultado" class="table-container"></div>

</div>

<script>
const BASE_URL = "https://datametricscolombia.github.io/presidencia_20260531";

let tipo = "testigos";
let cache = {}; // cache por shard

/* =========================
   CAMBIAR TIPO
========================= */
function setTipo(t) {

    tipo = t;

    document.getElementById("btnTestigos").classList.remove("active");
    document.getElementById("btnVotantes").classList.remove("active");

    document.getElementById(
        t === "testigos" ? "btnTestigos" : "btnVotantes"
    ).classList.add("active");

    limpiar();
}

/* =========================
   CARGAR SHARD DINÁMICO
========================= */
async function cargarShard(id) {

    const shard = id.substring(0, 2) || "00";
    const key = `${tipo}_${shard}`;

    if (cache[key]) return cache[key];

    const status = document.getElementById("status");

    try {

        const cacheLS = localStorage.getItem(key);
        const timeLS = localStorage.getItem(key + "_time");

        const now = Date.now();
        const TTL = 1000 * 60 * 60;

        if (cacheLS && timeLS && (now - timeLS < TTL)) {
            cache[key] = JSON.parse(cacheLS);
            return cache[key];
        }

        status.innerText = "Cargando índice...";

        const res = await fetch(
            `${BASE_URL}/${tipo}/lookup/id_lookup_${shard}.json`
        );

        if (!res.ok) throw new Error("Shard no encontrado");

        const data = await res.json();

        cache[key] = data;

        localStorage.setItem(key, JSON.stringify(data));
        localStorage.setItem(key + "_time", now);

        status.innerText = "";

        return data;

    } catch (e) {
        status.innerText = "";
        console.error(e);
        return null;
    }
}

/* =========================
   BUSCAR
========================= */
async function buscar() {

    const input = document.getElementById("inputId");
    const clearBtn = document.getElementById("clearBtn");
    const status = document.getElementById("status");

    const id = input.value.trim();

    clearBtn.style.display = id ? "block" : "none";

    if (!id) {
        limpiar();
        return;
    }

    const shardData = await cargarShard(id);

    if (!shardData) {
        document.getElementById("resultado").innerHTML =
            "<p class='error'>Sin datos</p>";
        return;
    }

    const path = shardData[id];

    if (!path) {
        document.getElementById("resultado").innerHTML =
            "<p class='error'>No encontrado</p>";
        return;
    }

    try {

        status.innerText = "Cargando datos...";

        const res = await fetch(`${BASE_URL}/${tipo}/${path}`);

        if (!res.ok) throw new Error("Error JSON");

        const data = await res.json();

        status.innerText = "";

        mostrarTabla(data);

    } catch (e) {
        status.innerText = "";
        document.getElementById("resultado").innerHTML =
            "<p class='error'>Error cargando datos</p>";
    }
}

/* =========================
   TABLA
========================= */
function mostrarTabla(data) {

    let html = "<table>";

    for (let key in data) {
        if (key === "_hash") continue;

        html += `<tr>
                    <td><b>${key}</b></td>
                    <td>${data[key]}</td>
                 </tr>`;
    }

    html += "</table>";

    document.getElementById("resultado").innerHTML = html;
}

/* =========================
   LIMPIAR
========================= */
function limpiar() {
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("status").innerText = "";
}

/* =========================
   EVENTOS
========================= */
document.getElementById("inputId").addEventListener("input", () => {
    const val = document.getElementById("inputId").value;
    document.getElementById("clearBtn").style.display = val ? "block" : "none";
});

document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("inputId").value = "";
    document.getElementById("clearBtn").style.display = "none";
    limpiar();
});
</script>

<div class="footer">
    <hr class="footer-line">

    <h3>Data Metrics Colombia Ltda</h3>
    <h3>Derechos Reservados</h3>

    <hr class="footer-line">
    <hr class="footer-line">
    <hr class="footer-line">
</div>

</body>
</html>
