<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Nacional</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 16px;
    background: #f4f6f9;
}

.container {
    max-width: 900px;
    margin: auto;
}

h2 {
    text-align: center;
}

/* Buscador */
.search-box {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px 40px 12px 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* Botón limpiar */
.clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #999;
    display: none;
}

.clear-btn:hover {
    color: #333;
}

/* Tabla */
.table-container {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

td {
    border: 1px solid #ddd;
    padding: 10px;
    font-size: 14px;
    word-break: break-word;
}

/* Estados */
.loading {
    text-align: center;
    color: #666;
}

.error {
    color: red;
    text-align: center;
}

/* Mobile */
@media (max-width: 600px) {
    input {
        font-size: 14px;
        padding: 10px 36px 10px 10px;
    }

    td {
        font-size: 13px;
        padding: 8px;
    }
}
</style>
</head>

<body>

<div class="container">

<h2>Consulta por Número de ID</h2>

<div class="search-box">
    <input type="text" id="inputId" placeholder="Ingrese número de identificación">
    <span class="clear-btn" id="clearBtn">✕</span>
</div>

<div id="status" class="loading"></div>

<div id="resultado" class="table-container"></div>

</div>

<script>
const BASE_URL = "https://datametricscolombia.github.io/presidencia_20260531";

let idLookup = null;

/* =========================
   CARGA CON CACHE
========================= */
async function cargarLookup() {

    const cache = localStorage.getItem("id_lookup_cache");
    const cacheTime = localStorage.getItem("id_lookup_time");

    const now = Date.now();
    const TTL = 1000 * 60 * 60; // 1 hora

    if (cache && cacheTime && (now - cacheTime < TTL)) {
        idLookup = JSON.parse(cache);
        return;
    }

    document.getElementById("status").innerText = "Cargando índice...";

    const res = await fetch(`${BASE_URL}/id_lookup.json`);
    idLookup = await res.json();

    localStorage.setItem("id_lookup_cache", JSON.stringify(idLookup));
    localStorage.setItem("id_lookup_time", now);

    document.getElementById("status").innerText = "";
}

/* =========================
   BUSCAR POR ID
========================= */
async function buscar() {

    const input = document.getElementById("inputId");
    const clearBtn = document.getElementById("clearBtn");

    const id = input.value.trim();

    clearBtn.style.display = id ? "block" : "none";

    if (!id) {
        limpiarResultado();
        return;
    }

    if (!idLookup) await cargarLookup();

    const path = idLookup[id];

    if (!path) {
        document.getElementById("resultado").innerHTML =
            "<p class='error'>No encontrado</p>";
        return;
    }

    const url = `${BASE_URL}/${path}`;

    document.getElementById("status").innerText = "Cargando datos...";

    try {

        const res = await fetch(url);
        const data = await res.json();

        document.getElementById("status").innerText = "";

        mostrarTabla(data);

    } catch (e) {
        document.getElementById("status").innerText = "";
        document.getElementById("resultado").innerHTML =
            "<p class='error'>Error cargando datos</p>";
    }
}

/* =========================
   MOSTRAR TABLA
========================= */
function mostrarTabla(data) {

    let html = "<table>";

    for (let key in data) {
        html += `<tr>
                    <td><b>${key}</b></td>
                    <td>${data[key]}</td>
                 </tr>`;
    }

    html += "</table>";

    document.getElementById("resultado").innerHTML = html;
}

/* =========================
   LIMPIAR
========================= */
function limpiarResultado() {
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("status").innerText = "";
}

/* =========================
   EVENTOS
========================= */
document.getElementById("inputId").addEventListener("input", buscar);

document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("inputId").value = "";
    document.getElementById("clearBtn").style.display = "none";
    limpiarResultado();
});

/* =========================
   INIT
========================= */
cargarLookup();

</script>

</body>
</html>
