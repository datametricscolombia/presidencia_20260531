<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Nacional</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 16px;
    background: #f4f6f9;
}

.container {
    max-width: 900px;
    margin: auto;
}

h2 {
    text-align: center;
}

.search-box {
    position: relative;
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.clear-btn {
    position: absolute;
    right: 110px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    display: none;
    color: #999;
}

.table-container {
    margin-top: 20px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

td {
    border: 1px solid #ddd;
    padding: 10px;
}

.loading {
    text-align: center;
    margin-top: 10px;
}

.error {
    color: red;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h2>Consulta por Número de ID</h2>

<div class="search-box">
    <input type="text" id="inputId" placeholder="Ingrese número de identificación">
    <span class="clear-btn" id="clearBtn">✕</span>
    <button onclick="buscar()">Buscar</button>
</div>

<div id="status" class="loading"></div>
<div id="resultado" class="table-container"></div>

</div>

<script>
const BASE_URL = "https://datametricscolombia.github.io/presidencia_20260531/presidencia";

let idLookup = null;

/* =========================
   CARGA CON CACHE ROBUSTA
========================= */
async function cargarLookup() {

    if (idLookup) return; // evita recargas

    const status = document.getElementById("status");

    try {

        const cache = localStorage.getItem("id_lookup_cache");
        const cacheTime = parseInt(localStorage.getItem("id_lookup_time"));

        const now = Date.now();
        const TTL = 1000 * 60 * 60;

        if (cache && cacheTime && (now - cacheTime < TTL)) {
            idLookup = JSON.parse(cache);
            return;
        }

        status.innerText = "Cargando índice...";

        const res = await fetch(`${BASE_URL}/id_lookup.json`);

        if (!res.ok) throw new Error("Error descargando índice");

        idLookup = await res.json();

        localStorage.setItem("id_lookup_cache", JSON.stringify(idLookup));
        localStorage.setItem("id_lookup_time", now.toString());

        status.innerText = "";

    } catch (e) {
        status.innerText = "";
        document.getElementById("resultado").innerHTML =
            "<p class='error'>Error cargando índice</p>";
        console.error(e);
    }
}

/* =========================
   BUSCAR
========================= */
async function buscar() {

    const input = document.getElementById("inputId");
    const clearBtn = document.getElementById("clearBtn");
    const status = document.getElementById("status");

    const id = input.value.trim();

    clearBtn.style.display = id ? "block" : "none";

    if (!id) {
        limpiar();
        return;
    }

    await cargarLookup();

    if (!idLookup) return;

    const path = idLookup[id];

    if (!path) {
        document.getElementById("resultado").innerHTML =
            "<p class='error'>No encontrado</p>";
        return;
    }

    try {

        status.innerText = "Cargando datos...";

        const res = await fetch(`${BASE_URL}/${path}`);

        if (!res.ok) throw new Error("Error JSON");

        const data = await res.json();

        status.innerText = "";

        mostrarTabla(data);

    } catch (e) {
        status.innerText = "";
        document.getElementById("resultado").innerHTML =
            "<p class='error'>Error cargando datos</p>";
    }
}

/* =========================
   TABLA
========================= */
function mostrarTabla(data) {

    let html = "<table>";

    for (let key in data) {
        html += `<tr>
                    <td><b>${key}</b></td>
                    <td>${data[key]}</td>
                 </tr>`;
    }

    html += "</table>";

    document.getElementById("resultado").innerHTML = html;
}

/* =========================
   LIMPIAR
========================= */
function limpiar() {
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("status").innerText = "";
}

/* =========================
   EVENTOS
========================= */
document.getElementById("inputId").addEventListener("input", () => {
    const val = document.getElementById("inputId").value;
    document.getElementById("clearBtn").style.display = val ? "block" : "none";
});

document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("inputId").value = "";
    document.getElementById("clearBtn").style.display = "none";
    limpiar();
});

/* =========================
   INIT
========================= */
cargarLookup();

</script>

</body>
</html>
