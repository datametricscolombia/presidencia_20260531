<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta Nacional</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }

input, button, select {
  padding: 8px;
  margin: 5px;
}

table {
  border-collapse: collapse;
  margin-top: 20px;
  background: white;
}

td, th {
  border: 1px solid #ccc;
  padding: 6px 10px;
}
</style>
</head>

<body>

<h2>Consulta Nacional por ID</h2>

<select id="tipo">
  <option value="testigos">Testigos</option>
  <option value="votantes">Votantes</option>
</select>

<br>

<input type="text" id="id_input" placeholder="Número de ID">
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

<script>

const BASE_URL = "https://datametricscolombia.github.io/presidencia_20260531";

let CACHE = {
  index: null,
  lookups: {}
};

// =========================
// CACHE HELPERS
// =========================
function saveCache(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

function loadCache(key) {
  const d = localStorage.getItem(key);
  return d ? JSON.parse(d) : null;
}

// =========================
// LOAD INDEX (cache)
// =========================
async function loadIndex(tipo) {

  const cacheKey = `index_${tipo}`;

  let data = loadCache(cacheKey);

  if (!data) {
    const res = await fetch(`${BASE_URL}/${tipo}/index_global.json`);
    data = await res.json();
    saveCache(cacheKey, data);
  }

  CACHE.index = data;
}

// =========================
// LOAD SHARD (lazy + cache)
// =========================
async function loadShard(tipo, shard) {

  const key = `${tipo}_${shard}`;

  if (CACHE.lookups[key]) return CACHE.lookups[key];

  let data = loadCache(key);

  if (!data) {
    const res = await fetch(`${BASE_URL}/${tipo}/lookup/id_lookup_${shard}.json`);
    data = await res.json();
    saveCache(key, data);
  }

  CACHE.lookups[key] = data;
  return data;
}

// =========================
// BUSCAR
// =========================
async function buscar() {

  const tipo = document.getElementById("tipo").value;
  const id = document.getElementById("id_input").value.trim();

  if (!id) return alert("Ingrese ID");

  await loadIndex(tipo);

  const shard = id.substring(0,2) || "00";

  const lookup = await loadShard(tipo, shard);

  const path = lookup[id];

  if (!path) {
    document.getElementById("resultado").innerHTML = "<b>No encontrado</b>";
    return;
  }

  const url = `${BASE_URL}/${tipo}/${path}/${id}.json`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    render(data);
  } catch {
    document.getElementById("resultado").innerHTML = "<b>Error cargando</b>";
  }
}

// =========================
// RENDER
// =========================
function render(data) {

  let html = "<table>";

  for (let k in data) {
    html += `<tr><th>${k}</th><td>${data[k]}</td></tr>`;
  }

  html += "</table>";

  document.getElementById("resultado").innerHTML = html;
}

</script>

</body>
</html>
